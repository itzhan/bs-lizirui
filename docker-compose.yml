name: babyshop

services:
  # ========== MySQL 数据库 ==========
  mysql:
    image: mysql:8.0
    container_name: babyshop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ab123168
      MYSQL_DATABASE: babyshop
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pab123168"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ========== Spring Boot 后端 ==========
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: babyshop-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/babyshop?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ab123168
      UPLOAD_PATH: /app/uploads/
      UPLOAD_BASE_URL: http://localhost:8080/uploads/
    ports:
      - "18081:8080"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/banners"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ========== 用户前端 ==========
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: babyshop-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "13000:3000"
    volumes:
      - ./uploads:/usr/share/nginx/uploads:ro

  # ========== 管理后台 ==========
  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    container_name: babyshop-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8848:8848"
    volumes:
      - ./uploads:/usr/share/nginx/uploads:ro

volumes:
  mysql_data:
    driver: local
